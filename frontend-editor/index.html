<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtAround - Editor Curatore</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
        
        /* Stili per messaggi e sezioni */
        #message { margin-top: 20px; padding: 10px; display: none; text-align: center; font-weight: bold; border-radius: 5px;}
        .hidden { display: none; }
        
        /* Login Box */
        #login-section { background: #e9ecef; padding: 20px; border-radius: 8px; text-align: center; }
        #login-section input { max-width: 300px; margin: 10px auto; display: block; }

        /* Lista Opere */
        .artwork-list { margin-top: 40px; border-top: 2px solid #ddd; padding-top: 20px; }
        .artwork-card { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>🎨 ArtAround: Pannello Curatore</h1>

    <div id="login-section">
        <h2>🔐 Accesso Staff</h2>
        <input type="email" id="email" placeholder="Email (es. mario@rossi.it)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="effettuaLogin()">Entra</button>
    </div>

    <div id="editor-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Nuova Opera</h2>
            <button onclick="logout()" style="background-color: #dc3545;">Esci</button>
        </div>

        <div id="artwork-form">
            <div class="form-group">
                <label>Titolo dell'Opera:</label>
                <input type="text" id="name" placeholder="Es. La Gioconda" required>
            </div>
            <div class="form-group">
                <label>Autore:</label>
                <input type="text" id="author" placeholder="Es. Leonardo da Vinci" required>
            </div>
            <div class="form-group">
                <label>Licenza (Semantic Web):</label>
                <input type="text" id="license" placeholder="Es. Public Domain">
            </div>
            <div class="form-group">
                <label>Descrizione:</label>
                <textarea id="description" rows="4" placeholder="Descrivi l'opera..."></textarea>
            </div>
            <button onclick="salvaOpera()">💾 Salva Opera</button>
        </div>

    <div id="message"></div>

    <div class="artwork-list">
        <h2>🖼️ Opere nel Museo</h2>
        <div style="margin-bottom: 20px;">
            <input type="text" id="searchBar" placeholder="🔍 Cerca opera..." onkeyup="cercaOpere()" style="padding: 10px;">
        </div>
        <div id="lista-opere"><p>Caricamento...</p></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let token = localStorage.getItem('artaround_token'); // Cerchiamo se c'è già un token salvato

        // All'avvio, controlliamo se l'utente è già loggato
        if (token) {
            mostraEditor();
        }

        // --- FUNZIONI DI AUTH ---
        async function effettuaLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('artaround_token', token); // Salviamo il token nel browser!
                    mostraEditor();
                } else {
                    alert("Errore Login: " + data.message);
                }
            } catch (error) {
                console.error(error);
                alert("Errore di connessione");
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('artaround_token');
            location.reload(); // Ricarica la pagina
        }

        function mostraEditor() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('editor-section').classList.remove('hidden');
        }

        // --- FUNZIONI EDITOR (Modificate per usare il Token) ---
        async function salvaOpera() {
            const name = document.getElementById('name').value;
            const author = document.getElementById('author').value;
            const license = document.getElementById('license').value;
            const description = document.getElementById('description').value;

            if (!name || !author) { alert("Titolo e Autore obbligatori!"); return; }

            const nuovaOpera = {
                "@context": "https://schema.org", "@type": "VisualArtwork",
                name, author, license, description,
                dateCreated: "Sconosciuta", provider: "Museo ArtAround"
            };

            try {
                const response = await fetch(`${API_URL}/items`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // <--- ECCO LA CHIAVE! Inviamo il token
                    },
                    body: JSON.stringify(nuovaOpera)
                });

                const data = await response.json();
                const msgDiv = document.getElementById('message');
                msgDiv.style.display = 'block';

                if (response.ok) {
                    msgDiv.innerHTML = '✅ Opera salvata!';
                    msgDiv.style.background = '#d4edda'; msgDiv.style.color = '#155724';
                    cercaOpere(); // Aggiorna la lista
                } else {
                    msgDiv.innerHTML = `❌ Errore: ${data.message}`;
                    msgDiv.style.background = '#f8d7da'; msgDiv.style.color = '#721c24';
                }
            } catch (error) {
                console.error(error);
                alert("Errore salvataggio");
            }
        }

        // --- FUNZIONI DI LETTURA (Restano uguali) ---
        async function cercaOpere() {
            const testo = document.getElementById('searchBar').value;
            let url = `${API_URL}/items`;
            if (testo) url += `?q=${testo}`;

            try {
                const res = await fetch(url);
                const opere = await res.json();
                const container = document.getElementById('lista-opere');
                container.innerHTML = '';

                if (opere.length === 0) { container.innerHTML = '<p>Nessuna opera trovata.</p>'; return; }

                opere.forEach(op => {
                    container.innerHTML += `
                        <div class="artwork-card">
                            <h3>${op.name}</h3>
                            <p><strong>Autore:</strong> ${op.author}</p>
                            <small>${op.license || ''}</small>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        window.onload = cercaOpere;
    </script>

</body>
</html>
